syntax = "proto3";

package auth;

message LoginRequest {
    string email = 1;
    string password = 2;
}

message LoginResponse {
    int32 code = 1;
    string error_msg = 2;

    int32 userid = 3;
    string token = 4;
    string username = 5;
}

message RegisterRequest {
    string username = 1;
    string email = 2;
    string password = 3;
}

message RegisterResponse {
    int32 code = 1;
    string error_msg = 2;
}

message VerifyTokenRequest {
    string token = 1;
}

message VerifyTokenResponse {
    int32 code = 1;
    string error_msg = 2;
    int32 userid = 3;
    string username = 4;
}

service AuthServer {
    rpc Login (LoginRequest) returns (LoginResponse);
    rpc Register (RegisterRequest) returns (RegisterResponse);
    rpc Verify (VerifyTokenRequest) returns (VerifyTokenResponse);
}