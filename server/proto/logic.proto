syntax = "proto3";

package logic;

message bathPullMessageRequest {
    bytes message = 3;
}

message bathPullMessageResponse {
    bytes message = 1;
}

message clientMessageRequest {
    int32 userid = 1;
    string username = 2;
    bytes message = 3;
}

message clientMessageResponse {
    bool ok = 1;
    bytes message = 2;
}

message clearCursorsRequest {
    int32 userid = 1;
}

message clearCursorsResponse {
    bool ok = 1;
}

message joinSessionRequest {
    int32 userid = 1;
    string roomname = 2;
}

message joinSessionResponse {
    int64 roomid = 1;
    int32 code = 2;
    string error_msg = 3;
}

message createSessionRequest {
    int32 userid = 1;
    string roomname = 2;
}

message createSessionResponse {
    int64 roomid = 1;
    int32 code = 2;
    string error_msg = 3;
}

message PullMessageRequest {
    int64 roomid = 1;
    string roomname = 2;
    int64 messageid = 3;
}

message PullMessageResponse {
    bytes message = 1;
}

service LogicServer {
    rpc bathPullMessage (bathPullMessageRequest) returns (stream bathPullMessageResponse);
    rpc clientMessage (clientMessageRequest) returns (clientMessageResponse);
    rpc clearCursors (clearCursorsRequest) returns (clearCursorsResponse);
    rpc joinSession (joinSessionRequest) returns (joinSessionResponse);
    rpc createSession (createSessionRequest) returns (createSessionResponse);
    rpc pullMessage (PullMessageRequest) returns (PullMessageResponse);
}